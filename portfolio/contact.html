        <!-- Content exclusive to current page (contact.html) -->
        <main>
            <form class="form-scss" style="padding-top: 50px;"> <!-- Form template from https://getbootstrap.com/docs/5.3/forms/overview/ -->
                <!-- First Name Input -->
                <div class="mb-3" style="display: flex; justify-content: center;">
                    <label for="exampleInputPassword1" class="form-label">Please enter your first name:&nbsp;</label>
                    <input type="text" class="form-control" style="font-size: 16px; width: 200px;">
                    <!-- "width: 200px;" makes textbox longer
                    From https://www.w3schools.com/tags/att_input_type_text.asp -->
                </div>

                <!-- Last Name Input-->
                <div class="mb-3" style="display: flex; justify-content: center; padding-top: 20px;">
                    <label for="exampleInputPassword1" class="form-label">Please enter your last name:&nbsp;</label>
                    <input type="text" class="form-control" style="font-size: 16px; width: 200px;">
                </div>

                <!-- Email Input -->
                <div class="mb-3" style="display: flex; justify-content: center; padding-top: 20px;">
                    <label for="exampleInputEmail1" class="form-label">What is your email address?&nbsp;</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" style="font-size: 16px; width: 300px;"> <!-- Wider than first and last name inputs -->
                </div>
                <!-- Email Input Help (format) -->
                <div class="col-auto" style="display: flex; justify-content: center; font-size: 14px; padding-top: 5px; font-style: italic;">
                    <span id="passwordHelpInline" class="form-text">
                        Provide your full email address (e.g. email@example.com).
                    </span>
                </div>

                <!-- Message Input -->
                <div class="mb-3" style="display: flex; justify-content: center; padding-top: 20px;">
                    <label for="exampleFormControlTextarea1" class="form-label">Additional information:&nbsp;</label>
                    <textarea class="form-control" rows="7" style="font-size: 16px; width: 500px;"></textarea>
                    <!-- "width: 500px;" makes textbox wide (default value: can be resized on, at least, desktop)
                    "rows='7'" makes textbox taller (six enters/returns before default max height is reached) -->
                </div>

                <!-- Checkbox to confirm user information is correct (optional) -->
                <div class="mb-3 form-check" style="display: flex; justify-content: center; padding-top: 20px;">
                    <input type="checkbox" class="form-check-input" id="exampleCheck1">
                    <label class="form-check-label" for="exampleCheck1">
                        &nbsp;The information that I have inputted is correct and valid.
                    </label>
                </div>

                <!-- Submit Button ("Send") -->
                <div style="display: flex; justify-content: center; align-items: center; padding-top: 20px;">
                    <!-- "<div>" container is used to center button on page -->
                    <button type="submit" class="download-btn" formtarget="_blank" style="font-size: 16px; justify-content: center; font-style: normal;">
                        <!-- "formtarget="_blank" opens submission form in new tab
                        From https://www.w3schools.com/tags/att_button_formtarget.asp 
                        "font-style: normal;" is used to not italicize the text (override "download-btn")-->
                        &star; Send &star;
                    </button>
                </div>
            </form>
